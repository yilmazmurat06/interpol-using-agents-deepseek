<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>INTERPOL Red Notices — Live Monitor</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=DM+Serif+Display:ital@0;1&family=JetBrains+Mono:wght@400;500;600&family=Inter:wght@400;500;600;700&display=swap" rel="stylesheet">
<style>
/* ===================================================================
   Design: FORENSIC SURVEILLANCE
   Tone: Cold institutional — deep charcoal, cool blue-gray data,
         amber alarms. DM Serif Display for authority, JetBrains Mono
         for machine-readable data, Inter for UI.
   =================================================================== */
:root {
  --bg-deep:       #0a0e14;
  --bg-surface:    #12161e;
  --bg-card:       #181c26;
  --bg-card-hover: #1e2330;
  --bg-input:      #0f131a;
  --border-subtle: #232a36;
  --border-mid:    #2e3644;
  --text-primary:  #e2e6ed;
  --text-secondary:#8b93a5;
  --text-muted:    #58627a;
  --accent-blue:   #4a90d9;
  --accent-amber:  #f5a623;
  --alarm-glow:    #ff4444;
  --alarm-bg:      rgba(255, 68, 68, 0.08);
  --alarm-border:  rgba(255, 68, 68, 0.35);
  --flag-bg:       #1a1f2b;
  --radius-sm:     4px;
  --radius-md:     8px;
  --radius-lg:     12px;
  --shadow-card:   0 1px 3px rgba(0,0,0,0.4), 0 1px 8px rgba(0,0,0,0.2);
  --transition-fast: 120ms ease;
  --transition-normal: 250ms ease;
}

*, *::before, *::after { box-sizing:border-box; margin:0; padding:0; }

body {
  font-family: 'Inter', -apple-system, sans-serif;
  background: var(--bg-deep);
  color: var(--text-primary);
  min-height: 100vh;
  line-height: 1.5;
  -webkit-font-smoothing: antialiased;
}

/* ── Layout ─────────────────────────────── */
.app-header {
  position: sticky; top: 0; z-index: 100;
  background: var(--bg-surface);
  border-bottom: 1px solid var(--border-subtle);
  padding: 12px 24px;
  display: flex; align-items: center; justify-content: space-between;
  gap: 16px;
  backdrop-filter: blur(12px);
  -webkit-backdrop-filter: blur(12px);
}
.app-brand {
  font-family: 'DM Serif Display', serif;
  font-size: 1.35rem; color: var(--text-primary);
  letter-spacing: -0.01em;
}
.app-brand span { color: var(--alarm-glow); }
.app-stats {
  font-family: 'JetBrains Mono', monospace;
  font-size: 0.8rem; color: var(--text-secondary);
}
.app-stats strong { color: var(--text-primary); font-size: 1.1rem; }

.app-layout {
  display: grid;
  grid-template-columns: 280px 1fr;
  min-height: calc(100vh - 54px);
}
@media (max-width: 768px) {
  .app-layout { grid-template-columns: 1fr; }
  .filter-panel { position: fixed; z-index: 200; left: -300px; transition: left var(--transition-normal); }
  .filter-panel.open { left: 0; }
}

/* ── Filter Panel ───────────────────────── */
.filter-panel {
  background: var(--bg-surface);
  border-right: 1px solid var(--border-subtle);
  padding: 20px 16px;
  overflow-y: auto;
  display: flex; flex-direction: column; gap: 18px;
}
.filter-panel h2 {
  font-family: 'DM Serif Display', serif;
  font-size: 1.1rem; color: var(--text-secondary);
  letter-spacing: 0.04em; text-transform: uppercase;
}
.filter-group { display: flex; flex-direction: column; gap: 6px; }
.filter-group label {
  font-size: 0.7rem; font-weight: 600; text-transform: uppercase;
  letter-spacing: 0.08em; color: var(--text-muted);
}
.filter-group input, .filter-group select {
  background: var(--bg-input); color: var(--text-primary);
  border: 1px solid var(--border-mid); border-radius: var(--radius-sm);
  padding: 8px 10px; font-size: 0.82rem; outline: none;
  transition: border var(--transition-fast);
}
.filter-group input:focus, .filter-group select:focus {
  border-color: var(--accent-blue);
}
.filter-group select[multiple] {
  min-height: 120px;
}
.filter-group select[multiple] option {
  padding: 4px 6px;
}
.filter-actions {
  display: flex; gap: 8px; flex-wrap: wrap;
}
.btn {
  font-family: 'Inter', sans-serif; font-size: 0.78rem; font-weight: 600;
  padding: 7px 14px; border-radius: var(--radius-sm); border: none;
  cursor: pointer; transition: all var(--transition-fast);
  text-transform: uppercase; letter-spacing: 0.04em;
}
.btn-primary { background: var(--accent-blue); color: #fff; }
.btn-primary:hover { background: #3d7fc4; }
.btn-secondary { background: transparent; color: var(--text-secondary); border: 1px solid var(--border-mid); }
.btn-secondary:hover { border-color: var(--text-secondary); color: var(--text-primary); }
.btn-alarm { background: transparent; color: var(--alarm-glow); border: 1px solid var(--alarm-border); }
.btn-alarm.active, .btn-alarm:hover { background: var(--alarm-bg); }

.mobile-filter-toggle {
  display: none;
  background: var(--bg-surface); color: var(--text-secondary);
  border: 1px solid var(--border-mid); padding: 8px 12px;
  font-size: 0.8rem; border-radius: var(--radius-sm); cursor: pointer;
}
@media (max-width: 768px) { .mobile-filter-toggle { display: block; } }

/* ── Main Content Area ─────────────────── */
.main-content { padding: 20px 24px; display: flex; flex-direction: column; gap: 16px; }

.toolbar {
  display: flex; align-items: center; justify-content: space-between;
  gap: 12px; flex-wrap: wrap;
}
.toolbar-left { display: flex; align-items: center; gap: 8px; }
.result-count {
  font-family: 'JetBrains Mono', monospace; font-size: 0.75rem;
  color: var(--text-muted);
}
.sort-select {
  background: var(--bg-input); color: var(--text-secondary);
  border: 1px solid var(--border-mid); border-radius: var(--radius-sm);
  padding: 6px 10px; font-size: 0.75rem;
}

/* ── Card Grid ─────────────────────────── */
.card-grid {
  display: grid;
  grid-template-columns: repeat(auto-fill, minmax(320px, 1fr));
  gap: 16px;
}
@media (max-width: 500px) { .card-grid { grid-template-columns: 1fr; } }

.notice-card {
  background: var(--bg-card);
  border: 1px solid var(--border-subtle);
  border-radius: var(--radius-lg);
  overflow: hidden;
  box-shadow: var(--shadow-card);
  transition: border var(--transition-normal), box-shadow var(--transition-normal);
  animation: cardAppear 0.4s ease both;
  position: relative;
}
.notice-card:hover { border-color: var(--border-mid); box-shadow: 0 2px 12px rgba(0,0,0,0.5); }
.notice-card.alarm {
  border-color: var(--alarm-border);
  background: linear-gradient(135deg, var(--alarm-bg), var(--bg-card));
  animation: alarmPulse 2s ease-in-out infinite, cardAppear 0.4s ease both;
}
.notice-card.alarm::before {
  content: '⚠ ALERT';
  position: absolute; top: 8px; right: 8px; z-index: 2;
  font-family: 'JetBrains Mono', monospace;
  font-size: 0.6rem; font-weight: 700;
  color: var(--alarm-glow); background: rgba(255,68,68,0.15);
  padding: 3px 8px; border-radius: 3px;
  letter-spacing: 0.1em;
}
.notice-card.just-updated { animation: flashHighlight 0.8s ease; }

@keyframes cardAppear {
  from { opacity: 0; transform: translateY(12px); }
  to { opacity: 1; transform: translateY(0); }
}
@keyframes alarmPulse {
  0%, 100% { box-shadow: 0 0 0 0 rgba(255,68,68,0.25); }
  50% { box-shadow: 0 0 12px 2px rgba(255,68,68,0.15); }
}
@keyframes flashHighlight {
  0% { background: rgba(74,144,217,0.12); }
  100% { background: transparent; }
}

/* ── Card Image ────────────────────────── */
.card-thumb-wrap {
  height: 220px;
  background: #0d1117;
  display: flex; align-items: center; justify-content: center;
  overflow: hidden;
  position: relative;
}
.card-thumb-wrap::after {
  content: ''; position: absolute; inset: 0;
  background: linear-gradient(to bottom, transparent 70%, rgba(10,14,20,0.6));
  pointer-events: none;
}
.card-thumb-wrap img {
  max-width: 100%; max-height: 220px;
  object-fit: contain;
}
.card-thumb-wrap .no-image {
  font-family: 'JetBrains Mono', monospace;
  font-size: 0.7rem; color: var(--text-muted);
  letter-spacing: 0.06em;
}

/* ── Card Body ─────────────────────────── */
.card-body { padding: 14px 16px 16px; display: flex; flex-direction: column; gap: 8px; }
.card-name {
  font-family: 'DM Serif Display', serif;
  font-size: 1.25rem; line-height: 1.2; color: var(--text-primary);
}
.card-forename { font-style: italic; opacity: 0.8; }
.card-meta {
  display: flex; flex-wrap: wrap; gap: 6px;
  font-family: 'JetBrains Mono', monospace;
  font-size: 0.7rem; color: var(--text-secondary);
  align-items: center;
}
.card-meta-item {
  display: inline-flex; align-items: center; gap: 3px;
  background: var(--flag-bg); padding: 2px 8px;
  border-radius: 3px;
}
.sex-badge {
  padding: 2px 8px; border-radius: 3px;
  font-weight: 600; font-size: 0.7rem;
}
.sex-badge.male { background: rgba(74,144,217,0.2); color: #6aa8f0; }
.sex-badge.female { background: rgba(217,74,144,0.2); color: #e06aa0; }

.card-charges {
  font-size: 0.72rem; color: var(--text-secondary);
  display: -webkit-box; -webkit-line-clamp: 3; -webkit-box-orient: vertical;
  overflow: hidden; line-height: 1.5;
}
.card-charges-label {
  font-size: 0.65rem; font-weight: 600; text-transform: uppercase;
  letter-spacing: 0.06em; color: var(--text-muted); margin-bottom: 2px;
}
.card-footer {
  display: flex; justify-content: space-between; align-items: center;
  margin-top: auto; padding-top: 8px; border-top: 1px solid var(--border-subtle);
}
.card-timestamp {
  font-family: 'JetBrains Mono', monospace;
  font-size: 0.6rem; color: var(--text-muted);
}

/* ── Pagination ────────────────────────── */
.pagination {
  display: flex; align-items: center; justify-content: center;
  gap: 4px; margin-top: 8px; flex-wrap: wrap;
}
.pagination button {
  font-family: 'JetBrains Mono', monospace; font-size: 0.72rem;
  padding: 5px 10px; background: var(--bg-card); color: var(--text-secondary);
  border: 1px solid var(--border-subtle); border-radius: var(--radius-sm);
  cursor: pointer; transition: all var(--transition-fast);
  min-width: 32px; text-align: center;
}
.pagination button:hover:not(:disabled) {
  border-color: var(--accent-blue); color: var(--text-primary);
}
.pagination button.active {
  background: var(--accent-blue); color: #fff; border-color: var(--accent-blue);
  font-weight: 700;
}
.pagination button:disabled { opacity: 0.3; cursor: default; }
.pagination .ellipsis {
  color: var(--text-muted); padding: 5px 4px; font-size: 0.72rem;
}

/* ── Connection Indicator ──────────────── */
.connection-dot {
  width: 8px; height: 8px; border-radius: 50%; display: inline-block;
}
.connection-dot.connected { background: #4caf50; }
.connection-dot.disconnected { background: var(--alarm-glow); animation: alarmPulse 1s ease infinite; }

/* ── Loader ────────────────────────────── */
.loader { text-align: center; padding: 40px; color: var(--text-muted); }
.loader::after {
  content: ''; display: inline-block; width: 20px; height: 20px;
  border: 2px solid var(--border-mid); border-top-color: var(--accent-blue);
  border-radius: 50%; animation: spin 0.8s linear infinite;
  vertical-align: middle; margin-left: 8px;
}
@keyframes spin { to { transform: rotate(360deg); } }

/* ── Empty State ───────────────────────── */
.empty-state {
  text-align: center; padding: 60px 20px; color: var(--text-muted);
}
.empty-state h3 {
  font-family: 'DM Serif Display', serif; font-size: 1.3rem;
  color: var(--text-secondary); margin-bottom: 8px;
}
</style>
</head>
<body>

<header class="app-header">
  <div class="app-brand">INTERPOL <span>RED NOTICES</span></div>
  <div class="app-stats">
    <span class="connection-dot connected" id="connDot" title="SSE connected"></span>
    Live DB: <strong id="liveCounter">0</strong>
  </div>
</header>

<div class="app-layout">
  <!-- ── Filter Panel ── -->
  <aside class="filter-panel" id="filterPanel">
    <h2>Filters</h2>
    <div class="filter-group">
      <label for="searchInput">Name Search</label>
      <input type="text" id="searchInput" placeholder="Search by name...">
    </div>
    <div class="filter-group">
      <label for="nationalitySelect">Nationality</label>
      <select id="nationalitySelect">
        <option value="">All Nationalities</option>
      </select>
    </div>
    <div class="filter-group">
      <label for="sexSelect">Gender</label>
      <select id="sexSelect">
        <option value="">All</option>
        <option value="M">Male</option>
        <option value="F">Female</option>
      </select>
    </div>
    <div class="filter-group">
      <label for="issuingCountrySelect">Issuing Country</label>
      <select id="issuingCountrySelect">
        <option value="">All Countries</option>
      </select>
    </div>
    <div class="filter-group">
      <label for="chargesInput">Charges Keyword</label>
      <input type="text" id="chargesInput" placeholder="e.g. murder, fraud...">
    </div>
    <div class="filter-actions">
      <button class="btn btn-alarm" id="alarmToggle">Alarms Only</button>
      <button class="btn btn-secondary" id="resetFilters">Reset</button>
    </div>
  </aside>

  <!-- ── Main Content ── -->
  <main class="main-content">
    <button class="mobile-filter-toggle" id="mobileFilterToggle">☰ Filters</button>
    <div class="toolbar">
      <div class="toolbar-left">
        <span class="result-count" id="resultCount">Loading...</span>
      </div>
      <select class="sort-select" id="sortSelect">
        <option value="newest">Newest First</option>
        <option value="name_asc">Name A–Z</option>
        <option value="nationality_asc">Nationality A–Z</option>
      </select>
    </div>

    <div class="card-grid" id="cardGrid"></div>

    <div class="pagination" id="pagination"></div>
  </main>
</div>

<script>
// ══════════════════════════════════════════════════════════════
// State
// ══════════════════════════════════════════════════════════════
const state = {
  page: 1,
  pageSize: 20,
  total: 0,
  pages: 0,
  filters: {},
  sort: 'newest',
  alarmOnly: false,
  hasActiveFilters: false,
};

// ══════════════════════════════════════════════════════════════
// Helpers
// ══════════════════════════════════════════════════════════════

function countryFlag(code) {
  if (!code || code.length !== 2) return code || '🌍';
  return Array.from(code.toUpperCase())
    .map(c => String.fromCodePoint(c.charCodeAt(0) + 0x1F1A5))
    .join('');
}

function calculateAge(dob) {
  if (!dob) return null;
  const parts = dob.split('/');
  if (parts.length !== 3) return null;
  const [y, m, d] = parts.map(Number);
  const birth = new Date(y, m - 1, d);
  const now = new Date();
  let age = now.getFullYear() - birth.getFullYear();
  if (now.getMonth() < birth.getMonth() ||
      (now.getMonth() === birth.getMonth() && now.getDate() < birth.getDate())) {
    age--;
  }
  return age > 0 ? age : null;
}

function getSexLabel(sexId) {
  if (sexId === 'M') return '♂ Male';
  if (sexId === 'F') return '♀ Female';
  return 'Unknown';
}

function getSexClass(sexId) {
  if (sexId === 'M') return 'male';
  if (sexId === 'F') return 'female';
  return '';
}

function formatReceived(ts) {
  if (!ts) return '';
  const d = new Date(ts);
  return d.toLocaleString(undefined, { month:'short', day:'numeric', hour:'2-digit', minute:'2-digit' });
}

// ══════════════════════════════════════════════════════════════
// Card building
// ══════════════════════════════════════════════════════════════

function buildCard(notice, prepend) {
  const age = calculateAge(notice.date_of_birth);
  const idSafe = notice.notice_id.replace(/\//g, '-');
  const alarmClass = notice.is_alarm ? ' alarm' : '';
  const sexLabel = getSexLabel(notice.sex_id);
  const sexClass = getSexClass(notice.sex_id);

  const flags = (notice.nationalities || [])
    .map(n => countryFlag(n)).join(' ') || '🌍';

  const issuingFlags = (notice.arrest_warrants || [])
    .map(w => w.issuing_country_id)
    .filter((v, i, a) => a.indexOf(v) === i)
    .map(c => countryFlag(c)).join(' ') || '';

  const charges = (notice.arrest_warrants || [])
    .map(w => w.charge).join('; ') || 'No charges listed';

  const imgSrc = notice.image_url
    ? `/api/thumbnail/${encodeURIComponent(notice.notice_id)}`
    : '';
  const imgHtml = imgSrc
    ? `<img src="${imgSrc}" alt="Photo" loading="lazy" onerror="this.parentElement.innerHTML='<span class=no-image>NO IMAGE</span>'">`
    : '<span class="no-image">NO IMAGE</span>';

  const fullName = [notice.forename, notice.name].filter(Boolean).join(' ');

  const cardHtml = `
    <div class="notice-card${alarmClass}" id="card-${idSafe}">
      <div class="card-thumb-wrap">${imgHtml}</div>
      <div class="card-body">
        <div class="card-name">
          ${fullName || 'Unknown'}
        </div>
        <div class="card-meta">
          <span class="card-meta-item">${flags}</span>
          ${age !== null ? `<span class="card-meta-item">Age ${age}</span>` : ''}
          <span class="sex-badge ${sexClass}">${sexLabel}</span>
        </div>
        ${issuingFlags ? `<div class="card-meta"><span class="card-meta-item">Wanted by: ${issuingFlags}</span></div>` : ''}
        <div class="card-charges">
          <div class="card-charges-label">Charges</div>
          ${charges}
        </div>
        <div class="card-footer">
          <span class="card-timestamp">${formatReceived(notice.received_at)}</span>
        </div>
      </div>
    </div>`;

  const grid = document.getElementById('cardGrid');
  if (prepend) {
    grid.insertAdjacentHTML('afterbegin', cardHtml);
  } else {
    grid.insertAdjacentHTML('beforeend', cardHtml);
  }
  return document.getElementById(`card-${idSafe}`);
}

function updateCardInPlace(card, notice) {
  // Update name
  const nameEl = card.querySelector('.card-name');
  if (nameEl) {
    const fullName = [notice.forename, notice.name].filter(Boolean).join(' ');
    nameEl.textContent = fullName || 'Unknown';
  }

  // Update meta (flags, age)
  const metaItems = card.querySelectorAll('.card-meta');
  if (metaItems.length > 0) {
    const flags = (notice.nationalities || [])
      .map(n => countryFlag(n)).join(' ') || '🌍';
    const age = calculateAge(notice.date_of_birth);
    const sexLabel = getSexLabel(notice.sex_id);
    const sexClass = getSexClass(notice.sex_id);

    // Rebuild first meta line
    let metaHtml = `<span class="card-meta-item">${flags}</span>`;
    if (age !== null) metaHtml += `<span class="card-meta-item">Age ${age}</span>`;
    metaHtml += `<span class="sex-badge ${sexClass}">${sexLabel}</span>`;
    metaItems[0].innerHTML = metaHtml;

    // Issuing countries (second meta line)
    if (metaItems.length > 1) {
      const issuingFlags = (notice.arrest_warrants || [])
        .map(w => w.issuing_country_id)
        .filter((v, i, a) => a.indexOf(v) === i)
        .map(c => countryFlag(c)).join(' ') || '';
      if (issuingFlags) {
        metaItems[1].innerHTML = `<span class="card-meta-item">Wanted by: ${issuingFlags}</span>`;
      } else {
        metaItems[1].innerHTML = '';
      }
    }
  }

  // Update charges
  const chargesEl = card.querySelector('.card-charges');
  if (chargesEl) {
    const charges = (notice.arrest_warrants || [])
      .map(w => w.charge).join('; ') || 'No charges listed';
    const label = chargesEl.querySelector('.card-charges-label');
    chargesEl.innerHTML = (label ? label.outerHTML : '') + charges;
  }

  // Update alarm state
  if (notice.is_alarm) {
    card.classList.add('alarm');
  } else {
    card.classList.remove('alarm');
  }

  // Update timestamp
  const tsEl = card.querySelector('.card-timestamp');
  if (tsEl) tsEl.textContent = formatReceived(notice.received_at);

  // Flash effect
  card.classList.add('just-updated');
  setTimeout(() => card.classList.remove('just-updated'), 800);
}

// ══════════════════════════════════════════════════════════════
// Data fetching
// ══════════════════════════════════════════════════════════════

function collectFilters() {
  const f = {};
  const search = document.getElementById('searchInput').value.trim();
  if (search) f.search = search;
  const nat = document.getElementById('nationalitySelect').value;
  if (nat) f.nationality = nat;
  const sex = document.getElementById('sexSelect').value;
  if (sex) f.sex = sex;
  const ic = document.getElementById('issuingCountrySelect').value;
  if (ic) f.issuing_country = ic;
  const chg = document.getElementById('chargesInput').value.trim();
  if (chg) f.charges = chg;
  if (state.alarmOnly) f.is_alarm = 'true';
  f.sort = state.sort;
  return f;
}

function hasFilters(filters) {
  return !!(filters.search || filters.nationality || filters.sex ||
            filters.issuing_country || filters.charges || filters.is_alarm);
}

async function loadNotices() {
  const filters = collectFilters();
  state.filters = filters;
  state.hasActiveFilters = hasFilters(filters);

  const params = new URLSearchParams({ page: state.page, page_size: state.pageSize, ...filters });
  const grid = document.getElementById('cardGrid');
  grid.innerHTML = '<div class="loader"></div>';

  try {
    const resp = await fetch(`/api/notices?${params}`);
    const data = await resp.json();
    state.total = data.total;
    state.pages = data.pages;
    state.page = data.page;
    renderCards(data.notices);
    renderPagination();
    updateResultCount();
  } catch (err) {
    grid.innerHTML = '<div class="empty-state"><h3>Connection Error</h3><p>Could not reach the server.</p></div>';
  }
}

function renderCards(notices) {
  const grid = document.getElementById('cardGrid');
  grid.innerHTML = '';
  if (!notices || notices.length === 0) {
    grid.innerHTML = '<div class="empty-state"><h3>No Results</h3><p>No notices match the current filters.</p></div>';
    return;
  }
  notices.forEach((n, i) => {
    const card = buildCard(n, false);
    if (card) card.style.animationDelay = `${i * 0.05}s`;
  });
}

function updateResultCount() {
  document.getElementById('resultCount').textContent =
    `${state.total} notice${state.total !== 1 ? 's' : ''} found`;
}

// ══════════════════════════════════════════════════════════════
// Pagination (PSC-4)
// ══════════════════════════════════════════════════════════════

function renderPagination() {
  const container = document.getElementById('pagination');
  if (state.pages <= 1) { container.innerHTML = ''; return; }

  let html = '';
  html += `<button ${state.page === 1 ? 'disabled' : ''} onclick="goToPage(1)">««</button>`;
  html += `<button ${state.page === 1 ? 'disabled' : ''} onclick="goToPage(${state.page - 1})">‹ Prev</button>`;

  const total = state.pages;
  const current = state.page;

  const pages = [];
  pages.push(1);
  for (let p = Math.max(2, current - 2); p <= Math.min(total - 1, current + 2); p++) {
    pages.push(p);
  }
  if (total > 1) pages.push(total);

  const unique = [...new Set(pages)].sort((a, b) => a - b);
  for (let i = 0; i < unique.length; i++) {
    if (i > 0 && unique[i] > unique[i-1] + 1) {
      html += '<span class="ellipsis">…</span>';
    }
    const p = unique[i];
    html += `<button class="${p === current ? 'active' : ''}" onclick="goToPage(${p})">${p}</button>`;
  }

  html += `<button ${state.page === total ? 'disabled' : ''} onclick="goToPage(${state.page + 1})">Next ›</button>`;
  html += `<button ${state.page === total ? 'disabled' : ''} onclick="goToPage(${total})">»»</button>`;
  container.innerHTML = html;
}

function goToPage(p) {
  if (p < 1 || p > state.pages || p === state.page) return;
  state.page = p;
  loadNotices();
}

// ══════════════════════════════════════════════════════════════
// Filters (server-side)
// ══════════════════════════════════════════════════════════════

function resetToPage1() {
  if (state.page !== 1) {
    state.page = 1;
  }
}

async function loadFilterOptions() {
  try {
    const resp = await fetch('/api/filters');
    const data = await resp.json();
    populateSelect('nationalitySelect', data.nationalities || []);
    populateSelect('issuingCountrySelect', data.issuing_countries || []);
    // Update live counter
    if (data.total_notices != null) {
      document.getElementById('liveCounter').textContent = data.total_notices;
    }
    return data;
  } catch (err) {
    console.error('Failed to load filter options', err);
  }
}

function populateSelect(id, options) {
  const sel = document.getElementById(id);
  const currentVal = sel.value;
  // Keep the first "All" option
  sel.innerHTML = sel.options[0] ? sel.options[0].outerHTML : '';
  options.forEach(opt => {
    const el = document.createElement('option');
    el.value = opt;
    el.textContent = `${countryFlag(opt)} ${opt}`;
    sel.appendChild(el);
  });
  sel.value = currentVal;
}

// ══════════════════════════════════════════════════════════════
// SSE — live updates (PSC-4: conditional insert)
// ══════════════════════════════════════════════════════════════

function connectSSE() {
  const evtSource = new EventSource('/api/stream');
  evtSource.onopen = () => {
    document.getElementById('connDot').className = 'connection-dot connected';
  };
  evtSource.onerror = () => {
    document.getElementById('connDot').className = 'connection-dot disconnected';
  };
  evtSource.addEventListener('message', (e) => {
    try {
      const data = JSON.parse(e.data);
      const notice = data.notice;
      if (!notice || !notice.notice_id) return;

      const idSafe = notice.notice_id.replace(/\//g, '-');
      const existing = document.getElementById(`card-${idSafe}`);

      if (existing) {
        updateCardInPlace(existing, notice);
      } else {
        // PSC-4: Only prepend if on page 1 with no active filters
        if (state.page === 1 && !state.hasActiveFilters) {
          buildCard(notice, true);
          // Update counter
          const counter = document.getElementById('liveCounter');
          counter.textContent = parseInt(counter.textContent || '0') + 1;
          state.total++;
          updateResultCount();
        }
      }
    } catch (err) {
      console.error('SSE message parse error', err);
    }
  });
}

// ══════════════════════════════════════════════════════════════
// Event bindings
// ══════════════════════════════════════════════════════════════

document.getElementById('searchInput').addEventListener('input', debounce(() => {
  resetToPage1(); loadNotices();
}, 300));

document.getElementById('nationalitySelect').addEventListener('change', () => {
  resetToPage1(); loadNotices();
});

document.getElementById('sexSelect').addEventListener('change', () => {
  resetToPage1(); loadNotices();
});

document.getElementById('issuingCountrySelect').addEventListener('change', () => {
  resetToPage1(); loadNotices();
});

document.getElementById('chargesInput').addEventListener('input', debounce(() => {
  resetToPage1(); loadNotices();
}, 300));

document.getElementById('sortSelect').addEventListener('change', (e) => {
  state.sort = e.target.value;
  resetToPage1(); loadNotices();
});

document.getElementById('alarmToggle').addEventListener('click', function() {
  state.alarmOnly = !state.alarmOnly;
  this.classList.toggle('active', state.alarmOnly);
  resetToPage1(); loadNotices();
});

document.getElementById('resetFilters').addEventListener('click', () => {
  document.getElementById('searchInput').value = '';
  document.getElementById('nationalitySelect').value = '';
  document.getElementById('sexSelect').value = '';
  document.getElementById('issuingCountrySelect').value = '';
  document.getElementById('chargesInput').value = '';
  state.alarmOnly = false;
  document.getElementById('alarmToggle').classList.remove('active');
  resetToPage1(); loadNotices();
});

document.getElementById('mobileFilterToggle').addEventListener('click', () => {
  document.getElementById('filterPanel').classList.toggle('open');
});

function debounce(fn, ms) {
  let timer;
  return function(...args) {
    clearTimeout(timer);
    timer = setTimeout(() => fn.apply(this, args), ms);
  };
}

// ══════════════════════════════════════════════════════════════
// Init
// ══════════════════════════════════════════════════════════════

async function init() {
  await loadFilterOptions();
  await loadNotices();
  connectSSE();
}

document.addEventListener('DOMContentLoaded', init);
</script>
