# =============================================================================
# Interpol Red Notice Scraper — Docker Compose Configuration
# =============================================================================
# 5 services: container-a (scraper), container-b (web+consumer),
# rabbitmq (message broker), postgres (database), minio (object storage).
#
# All configurable via .env — no hardcoded credentials, ports, or hostnames.
# All defaults live in .env.example — copy to .env before first run.
# Named volumes for all stateful services.
# =============================================================================

version: "3.9"

services:

  # ---------------------------------------------------------------------------
  # RabbitMQ — Message Broker
  # ---------------------------------------------------------------------------
  rabbitmq:
    image: rabbitmq:3-management-alpine
    container_name: interpol-rabbitmq
    hostname: rabbitmq
    restart: unless-stopped
    ports:
      - "${RABBITMQ_PORT}:5672"
      - "${RABBITMQ_MGMT_PORT}:15672"
    environment:
      RABBITMQ_DEFAULT_USER: ${RABBITMQ_DEFAULT_USER}
      RABBITMQ_DEFAULT_PASS: ${RABBITMQ_DEFAULT_PASS}
      # PSC-2: server-side heartbeat must match client (default 600)
      RABBITMQ_SERVER_ADDITIONAL_ERL_ARGS: "-rabbit heartbeat ${RABBITMQ_HEARTBEAT}"
    volumes:
      - rabbitmq_data:/var/lib/rabbitmq
    healthcheck:
      test: [ "CMD", "rabbitmq-diagnostics", "ping" ]
      interval: 30s
      timeout: 10s
      retries: 5
      start_period: 30s

  # ---------------------------------------------------------------------------
  # PostgreSQL — Notice Database
  # ---------------------------------------------------------------------------
  postgres:
    image: postgres:16-alpine
    container_name: interpol-postgres
    hostname: postgres
    restart: unless-stopped
    ports:
      - "${POSTGRES_PORT}:5432"
    environment:
      POSTGRES_DB: ${POSTGRES_DB}
      POSTGRES_USER: ${POSTGRES_USER}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD}
    volumes:
      - postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: [ "CMD-SHELL", "pg_isready -U ${POSTGRES_USER} -d ${POSTGRES_DB}" ]
      interval: 15s
      timeout: 5s
      retries: 5
      start_period: 20s

  # ---------------------------------------------------------------------------
  # MinIO — Object Storage for Raw Payloads
  # ---------------------------------------------------------------------------
  minio:
    image: minio/minio:RELEASE.2025-09-07T16-13-09Z
    container_name: interpol-minio
    hostname: minio
    restart: unless-stopped
    ports:
      - "${MINIO_API_PORT}:9000"
      - "${MINIO_CONSOLE_PORT}:9001"
    environment:
      MINIO_ROOT_USER: ${MINIO_ROOT_USER}
      MINIO_ROOT_PASSWORD: ${MINIO_ROOT_PASSWORD}
      # MC_HOST_local is required for mc ready healthcheck (PSC-5)
      MC_HOST_local: "http://${MINIO_ROOT_USER}:${MINIO_ROOT_PASSWORD}@localhost:9000"
    volumes:
      - minio_data:/data
    command: server /data --console-address ":9001"
    healthcheck:
      test: [ "CMD", "mc", "ready", "local" ]
      interval: 30s
      timeout: 10s
      retries: 5
      start_period: 20s

  # ---------------------------------------------------------------------------
  # Container A — Scraper + RabbitMQ Producer
  # ---------------------------------------------------------------------------
  container-a:
    build:
      context: ./container_a
      dockerfile: Dockerfile
    container_name: interpol-container-a
    restart: unless-stopped
    depends_on:
      rabbitmq:
        condition: service_healthy
    environment:
      LOG_LEVEL: ${LOG_LEVEL}
      RABBITMQ_URL: ${RABBITMQ_URL}
      RABBITMQ_QUEUE: ${RABBITMQ_QUEUE}
      RABBITMQ_HEARTBEAT: ${RABBITMQ_HEARTBEAT}
      SCRAPE_INTERVAL_SECONDS: ${SCRAPE_INTERVAL_SECONDS}
      INTERPOL_BASE_URL: ${INTERPOL_BASE_URL}
      INTERPOL_LIST_PATH: ${INTERPOL_LIST_PATH}
      INTERPOL_DETAIL_PATH: ${INTERPOL_DETAIL_PATH}
      JITTER_MIN_SECONDS: ${JITTER_MIN_SECONDS}
      JITTER_MAX_SECONDS: ${JITTER_MAX_SECONDS}
      SCRAPE_CONCURRENCY: ${SCRAPE_CONCURRENCY}
      SCRAPE_MAX_RETRIES: ${SCRAPE_MAX_RETRIES}
      CIRCUIT_BREAKER_THRESHOLD: ${CIRCUIT_BREAKER_THRESHOLD}
      CIRCUIT_BREAKER_PAUSE_SECONDS: ${CIRCUIT_BREAKER_PAUSE_SECONDS}
    # No ports exposed — container-a is internal only

    # ---------------------------------------------------------------------------
    # Container B — Flask Web Server + RabbitMQ Consumer
    # ---------------------------------------------------------------------------
  container-b:
    build:
      context: ./container_b
      dockerfile: Dockerfile
    container_name: interpol-container-b
    restart: unless-stopped
    ports:
      - "${FLASK_PORT}:${FLASK_PORT}"
    depends_on:
      rabbitmq:
        condition: service_healthy
      postgres:
        condition: service_healthy
      minio:
        condition: service_healthy
    environment:
      LOG_LEVEL: ${LOG_LEVEL}
      FLASK_PORT: ${FLASK_PORT}
      FLASK_HOST: ${FLASK_HOST}
      FLASK_DEBUG: ${FLASK_DEBUG}
      RABBITMQ_URL: ${RABBITMQ_URL}
      RABBITMQ_QUEUE: ${RABBITMQ_QUEUE}
      RABBITMQ_HEARTBEAT: ${RABBITMQ_HEARTBEAT}
      POSTGRES_DSN: ${POSTGRES_DSN}
      MINIO_ENDPOINT: ${MINIO_ENDPOINT}
      MINIO_ACCESS_KEY: ${MINIO_ACCESS_KEY}
      MINIO_SECRET_KEY: ${MINIO_SECRET_KEY}
      MINIO_BUCKET: ${MINIO_BUCKET}
      MINIO_SECURE: ${MINIO_SECURE}
      API_THUMBNAIL_TIMEOUT: ${API_THUMBNAIL_TIMEOUT}
      DEFAULT_PAGE_SIZE: ${DEFAULT_PAGE_SIZE}
      MAX_PAGE_SIZE: ${MAX_PAGE_SIZE}

# ---------------------------------------------------------------------------
# Named Volumes — all stateful services
# ---------------------------------------------------------------------------
volumes:
  postgres_data:
    driver: local
  rabbitmq_data:
    driver: local
  minio_data:
    driver: local
